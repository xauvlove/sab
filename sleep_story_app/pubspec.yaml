name: sleep_story_app
description: "睡眠故事 - Sleep Story App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.17

  # State Management
  provider: ^6.1.2

  # Network
  dio: ^5.8.0+1

  # Local Storage
  shared_preferences: ^2.3.5
  flutter_secure_storage: ^9.2.4

  # Audio
  just_audio: ^0.9.46
  audio_service: ^0.18.17

  # TTS (Text-to-Speech)
  flutter_tts: ^4.2.0

  # Utils
  intl: ^0.20.2
  uuid: ^4.5.1
  equatable: ^2.0.7
  json_annotation: ^4.9.0

  # Form
  flutter_verification_code: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  json_serializable: ^6.9.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
