server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: sleepstory-backend
  # 导入拆分的配置文件
  config:
    import:
      - classpath:application-database.yml
      - classpath:application-redis.yml
      - classpath:application-aliyun.yml
  # 启用MVC异常处理
  mvc:
    throw-exception-if-no-handler-found: true
  # SQL初始化配置
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      continue-on-error: false
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB
